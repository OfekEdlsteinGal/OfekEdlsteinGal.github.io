<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ofek Edlstein Gal</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #2f2f2f 0%, #3b3b3b 20%, #262626 100%);
      color: #f2f2f2;
      line-height: 1.6;
    }

    .topbar {
      background: linear-gradient(90deg, #0f0f0f, #1e1e1e, #0f0f0f);
      text-align: center;
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .page {
      max-width: 1100px;
      margin: 70px auto 80px;
      padding: 0 24px;
    }

    .card {
      background: #181818;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 48px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .eyebrow {
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #b8b8b8;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .chips,
    .contact-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .chip {
      background: #2a2a2a;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 18px;
      border-radius: 999px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      background: #2f2f2f;
      border: 1px solid rgba(255,255,255,0.12);
      color: #ffffff;
      font-weight: 600;
    }

    .section {
      margin-top: 46px;
    }

    .inner-box {
      background: #2a2a2a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 24px;
    }

    .contact-block {
      margin-top: 80px;
      background: linear-gradient(90deg, #0c0c0c, #111111, #0c0c0c);
      padding: 70px 0 60px;
    }

    .contact-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    footer {
      margin-top: 42px;
      color: #9d9d9d;
      font-size: 0.98rem;
    }
  </style>
</head>

<body>

  <header class="topbar">
    <!-- header template -->
  </header>

  <main class="page">
    <section class="card hero">
      <div class="eyebrow"></div>

      <h2></h2>

      <p></p>

      <div class="chips">
        <div class="chip"></div>
        <div class="chip"></div>
      </div>

      <section class="section">
        <h3></h3>
        <p class="subtitle"></p>
        <div class="inner-box"></div>
      </section>
    </section>
  </main>

  <section class="contact-block">
    <div class="contact-wrap">
      <h3></h3>
      <p></p>

      <div class="contact-buttons">
        <a class="btn" href="#"></a>
        <a class="btn" href="#"></a>
        <a class="btn" href="#"></a>
      </div>

      <footer></footer>
    </div>
  </section>

</body>
</html>
